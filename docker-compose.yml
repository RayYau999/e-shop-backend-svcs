version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: eshop-api-gateway/Dockerfile
    image: eshop-api-gateway:local
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/demo_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: devuser
      SPRING_DATASOURCE_PASSWORD: devpassword
      ESHOP_LOGIN_SERVICE_URL: http://login:8080
      ESHOP_PYMT_SERVICE_URL: http://payment:8081
      ESHOP_OLLAMA_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      login:
        condition: service_healthy
      payment:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  login:
    build:
      context: .
      dockerfile: eshop-login-svc/Dockerfile
    image: login-service:local
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/demo_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: devuser
      SPRING_DATASOURCE_PASSWORD: devpassword
      ESHOP_PYMT_SERVICE_URL: http://payment:8081
    depends_on:
      db:
        condition: service_healthy
      payment:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment:
    build:
      context: .
      dockerfile: eshop-pymt-svc/Dockerfile
    image: payment-service:local
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/demo_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: devuser
      SPRING_DATASOURCE_PASSWORD: devpassword
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ESHOP_SPRING_MAIL_USERNAME: ${ESHOP_SPRING_MAIL_USERNAME}
      ESHOP_SPRING_MAIL_PASSWORD: ${ESHOP_SPRING_MAIL_PASSWORD}
      ESHOP_CLIENT_MAIL: ${ESHOP_CLIENT_MAIL}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: demo-dev
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "devuser", "-pdevpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama list | grep -q 'llama3.2' || ollama pull llama3.2:latest && wait && ollama run llama3.2:latest"]
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 10g
        reservations:
          cpus: '3.0'
          memory: 6g
    healthcheck:
      test: ["CMD", "ollama", "show", "llama3.2"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka:
    image: apache/kafka:4.1.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
volumes:
  db-data:
  ollama-data:
